<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proveedores - Ferretería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: 100vh;
            background: #2c3e50;
        }
        .sidebar .nav-link {
            color: #ecf0f1;
            padding: 15px 20px;
            border-left: 4px solid transparent;
        }
        .sidebar .nav-link:hover {
            background: #34495e;
            border-left: 4px solid #3498db;
        }
        .sidebar .nav-link.active {
            background: #34495e;
            border-left: 4px solid #3498db;
        }
        .supplier-card {
            transition: transform 0.2s;
        }
        .supplier-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar p-0">
                <div class="position-sticky pt-3">
                    <div class="text-center p-3 border-bottom">
                        <i class="fas fa-tools fa-2x text-white mb-2"></i>
                        <h5 class="text-white mb-0">Ferretería</h5>
                        <small class="text-muted" id="userRole"></small>
                    </div>
                    <ul class="nav flex-column mt-3" id="mainMenu">
                        <!-- Menú se carga dinámicamente -->
                    </ul>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4" style="background: #f8f9fa; min-height: 100vh;">
                <!-- Navbar -->
                <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
                    <div class="container-fluid">
                        <button class="btn btn-link d-md-none" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu">
                            <i class="fas fa-bars"></i>
                        </button>
                        
                        <div class="d-flex align-items-center">
                            <span class="navbar-text me-3" id="userInfo"></span>
                            <div class="dropdown">
                                <button class="btn btn-outline-secondary dropdown-toggle" type="button" id="userDropdown" data-bs-toggle="dropdown">
                                    <i class="fas fa-user me-2"></i>
                                </button>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Cerrar Sesión</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </nav>

                <!-- Content -->
                <div class="container-fluid mt-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2><i class="fas fa-truck me-2"></i>Gestión de Proveedores</h2>
                        <button class="btn btn-primary" onclick="showSupplierModal()" id="addSupplierBtn" style="display: none;">
                            <i class="fas fa-plus me-2"></i>Nuevo Proveedor
                        </button>
                    </div>

                    <!-- Filtros -->
                    <div class="card mb-4">
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-search"></i></span>
                                        <input type="text" class="form-control" placeholder="Buscar proveedores..." id="searchInput">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Lista de Proveedores -->
                    <div class="row" id="suppliersContainer">
                        <!-- Los proveedores se cargan dinámicamente -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal para proveedores -->
    <div class="modal fade" id="supplierModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="supplierModalTitle">Nuevo Proveedor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="supplierForm">
                        <input type="hidden" id="supplierId">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="supplierName" class="form-label">Nombre *</label>
                                <input type="text" class="form-control" id="supplierName" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="supplierContact" class="form-label">Persona de Contacto</label>
                                <input type="text" class="form-control" id="supplierContact">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="supplierPhone" class="form-label">Teléfono</label>
                                <input type="tel" class="form-control" id="supplierPhone">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="supplierEmail" class="form-label">Email</label>
                                <input type="email" class="form-control" id="supplierEmail">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="supplierAddress" class="form-label">Dirección</label>
                            <textarea class="form-control" id="supplierAddress" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="saveSupplier()">Guardar Proveedor</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentUser = null;
        let suppliers = [];

        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            loadSuppliers();
        });

        // En la función checkAuth() agregar:
        function checkAuth() {
            const user = localStorage.getItem('user');
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            currentUser = JSON.parse(user);
            
            // Empleados no pueden acceder a proveedores
            if (currentUser.tipo === 'empleado') {
                window.location.href = 'dashboard.html';
                return;
            }
            
            document.getElementById('userInfo').textContent = `Bienvenido, ${currentUser.nombre}`;
            document.getElementById('userRole').textContent = currentUser.tipo;
            
            // MOSTRAR BOTÓN PARA ADMINISTRADORES - AGREGAR ESTA LÍNEA
            if (currentUser.tipo === 'admin') {
                document.getElementById('addSupplierBtn').style.display = 'block';
            }
            
            loadMenu();
        }

        function loadMenu() {
            const menu = document.getElementById('mainMenu');
            let menuItems = '';

            if (currentUser.tipo === 'admin') {
                menuItems = `
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="fas fa-tachometer-alt"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="products.html">
                            <i class="fas fa-box"></i>Productos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="categories.html">
                            <i class="fas fa-tags"></i>Categorías
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="suppliers.html">
                            <i class="fas fa-truck"></i>Proveedores
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="customers.html">
                            <i class="fas fa-users"></i>Clientes
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="sales.html">
                            <i class="fas fa-shopping-cart"></i>Ventas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="inventory.html">
                            <i class="fas fa-warehouse"></i>Inventario
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="users.html">
                            <i class="fas fa-user-cog"></i>Usuarios
                        </a>
                    </li>
                `;
            } else {
                menuItems = `
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="fas fa-tachometer-alt"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="products.html">
                            <i class="fas fa-box"></i>Productos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="categories.html">
                            <i class="fas fa-tags"></i>Categorías
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="suppliers.html">
                            <i class="fas fa-truck"></i>Proveedores
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="customers.html">
                            <i class="fas fa-users"></i>Clientes
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="sales.html">
                            <i class="fas fa-shopping-cart"></i>Ventas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="inventory.html">
                            <i class="fas fa-warehouse"></i>Inventario
                        </a>
                    </li>
                `;
            }

            menu.innerHTML = menuItems;
        }

        async function loadSuppliers() {
            try {
                const response = await fetch('../api/index.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + currentUser.id_usuario
                    },
                    body: JSON.stringify({
                        action: 'getSuppliers'
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    suppliers = result.data;
                    renderSuppliers();
                }
            } catch (error) {
                console.error('Error loading suppliers:', error);
            }
        }

        function renderSuppliers() {
            const container = document.getElementById('suppliersContainer');
            container.innerHTML = '';

            suppliers.forEach(supplier => {
                const actions = currentUser.tipo === 'admin' ? `
                    <div class="mt-3">
                        <button class="btn btn-sm btn-warning me-1" onclick="editSupplier(${supplier.id_proveedor})">
                            <i class="fas fa-edit me-1"></i>Editar
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteSupplier(${supplier.id_proveedor})">
                            <i class="fas fa-trash me-1"></i>Eliminar
                        </button>
                    </div>
                ` : '';

                const card = `
                    <div class="col-md-6 col-lg-4 mb-4">
                        <div class="card supplier-card h-100">
                            <div class="card-body">
                                <h5 class="card-title">${supplier.nombre}</h5>
                                
                                <div class="mb-2">
                                    ${supplier.contacto ? `
                                        <div class="d-flex align-items-center mb-1">
                                            <i class="fas fa-user me-2 text-muted"></i>
                                            <span>${supplier.contacto}</span>
                                        </div>
                                    ` : ''}
                                    
                                    ${supplier.telefono ? `
                                        <div class="d-flex align-items-center mb-1">
                                            <i class="fas fa-phone me-2 text-muted"></i>
                                            <span>${supplier.telefono}</span>
                                        </div>
                                    ` : ''}
                                    
                                    ${supplier.email ? `
                                        <div class="d-flex align-items-center mb-1">
                                            <i class="fas fa-envelope me-2 text-muted"></i>
                                            <span>${supplier.email}</span>
                                        </div>
                                    ` : ''}
                                </div>
                                
                                ${supplier.direccion ? `
                                    <p class="card-text">
                                        <small class="text-muted">
                                            <i class="fas fa-map-marker-alt me-1"></i>
                                            ${supplier.direccion}
                                        </small>
                                    </p>
                                ` : ''}
                                
                                <div class="d-flex justify-content-between align-items-center">
                                    <span class="badge bg-primary">${supplier.total_productos || 0} productos</span>
                                    <small class="text-muted">
                                        Registrado: ${new Date(supplier.fecha_registro).toLocaleDateString()}
                                    </small>
                                </div>
                                
                                ${actions}
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        function showSupplierModal() {
            document.getElementById('supplierModalTitle').textContent = 'Nuevo Proveedor';
            document.getElementById('supplierForm').reset();
            document.getElementById('supplierId').value = '';
            const modal = new bootstrap.Modal(document.getElementById('supplierModal'));
            modal.show();
        }

        async function editSupplier(id) {
            const supplier = suppliers.find(sup => sup.id_proveedor === id);
            if (supplier) {
                document.getElementById('supplierModalTitle').textContent = 'Editar Proveedor';
                document.getElementById('supplierId').value = supplier.id_proveedor;
                document.getElementById('supplierName').value = supplier.nombre;
                document.getElementById('supplierContact').value = supplier.contacto || '';
                document.getElementById('supplierPhone').value = supplier.telefono || '';
                document.getElementById('supplierEmail').value = supplier.email || '';
                document.getElementById('supplierAddress').value = supplier.direccion || '';
                
                const modal = new bootstrap.Modal(document.getElementById('supplierModal'));
                modal.show();
            }
        }

        async function saveSupplier() {
            const form = document.getElementById('supplierForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const supplierData = {
                nombre: document.getElementById('supplierName').value,
                contacto: document.getElementById('supplierContact').value,
                telefono: document.getElementById('supplierPhone').value,
                email: document.getElementById('supplierEmail').value,
                direccion: document.getElementById('supplierAddress').value
            };

            const supplierId = document.getElementById('supplierId').value;
            const action = supplierId ? 'updateSupplier' : 'createSupplier';

            if (supplierId) {
                supplierData.id = supplierId;
            }

            try {
                const response = await fetch('../api/index.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + currentUser.id_usuario
                    },
                    body: JSON.stringify({
                        action: action,
                        ...supplierData
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('Proveedor guardado correctamente');
                    bootstrap.Modal.getInstance(document.getElementById('supplierModal')).hide();
                    loadSuppliers();
                } else {
                    alert('Error al guardar proveedor: ' + result.message);
                }
            } catch (error) {
                console.error('Error saving supplier:', error);
                alert('Error de conexión al guardar proveedor');
            }
        }

        async function deleteSupplier(id) {
            if (!confirm('¿Estás seguro de que quieres eliminar este proveedor?')) {
                return;
            }

            try {
                const response = await fetch('../api/index.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + currentUser.id_usuario
                    },
                    body: JSON.stringify({
                        action: 'deleteSupplier',
                        id: id
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('Proveedor eliminado correctamente');
                    loadSuppliers();
                } else {
                    alert('Error al eliminar proveedor: ' + result.message);
                }
            } catch (error) {
                console.error('Error deleting supplier:', error);
                alert('Error de conexión al eliminar proveedor');
            }
        }

        // Filtro de búsqueda
        document.getElementById('searchInput').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const filteredSuppliers = suppliers.filter(supplier => 
                supplier.nombre.toLowerCase().includes(searchTerm) ||
                (supplier.contacto && supplier.contacto.toLowerCase().includes(searchTerm)) ||
                (supplier.email && supplier.email.toLowerCase().includes(searchTerm))
            );
            
            renderFilteredSuppliers(filteredSuppliers);
        });

        function renderFilteredSuppliers(filteredSuppliers) {
            const container = document.getElementById('suppliersContainer');
            container.innerHTML = '';

            filteredSuppliers.forEach(supplier => {
                const actions = currentUser.tipo === 'admin' ? `
                    <div class="mt-3">
                        <button class="btn btn-sm btn-warning me-1" onclick="editSupplier(${supplier.id_proveedor})">
                            <i class="fas fa-edit me-1"></i>Editar
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteSupplier(${supplier.id_proveedor})">
                            <i class="fas fa-trash me-1"></i>Eliminar
                        </button>
                    </div>
                ` : '';

                const card = `
                    <div class="col-md-6 col-lg-4 mb-4">
                        <div class="card supplier-card h-100">
                            <div class="card-body">
                                <h5 class="card-title">${supplier.nombre}</h5>
                                
                                <div class="mb-2">
                                    ${supplier.contacto ? `
                                        <div class="d-flex align-items-center mb-1">
                                            <i class="fas fa-user me-2 text-muted"></i>
                                            <span>${supplier.contacto}</span>
                                        </div>
                                    ` : ''}
                                    
                                    ${supplier.telefono ? `
                                        <div class="d-flex align-items-center mb-1">
                                            <i class="fas fa-phone me-2 text-muted"></i>
                                            <span>${supplier.telefono}</span>
                                        </div>
                                    ` : ''}
                                    
                                    ${supplier.email ? `
                                        <div class="d-flex align-items-center mb-1">
                                            <i class="fas fa-envelope me-2 text-muted"></i>
                                            <span>${supplier.email}</span>
                                        </div>
                                    ` : ''}
                                </div>
                                
                                ${supplier.direccion ? `
                                    <p class="card-text">
                                        <small class="text-muted">
                                            <i class="fas fa-map-marker-alt me-1"></i>
                                            ${supplier.direccion}
                                        </small>
                                    </p>
                                ` : ''}
                                
                                <div class="d-flex justify-content-between align-items-center">
                                    <span class="badge bg-primary">${supplier.total_productos || 0} productos</span>
                                    <small class="text-muted">
                                        Registrado: ${new Date(supplier.fecha_registro).toLocaleDateString()}
                                    </small>
                                </div>
                                
                                ${actions}
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        function logout() {
            if (confirm('¿Estás seguro de que quieres cerrar sesión?')) {
                localStorage.removeItem('user');
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
