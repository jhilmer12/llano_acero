<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Ferretería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: 100vh;
            background: #2c3e50;
        }
        .sidebar .nav-link {
            color: #ecf0f1;
            padding: 15px 20px;
            border-left: 4px solid transparent;
        }
        .sidebar .nav-link:hover {
            background: #34495e;
            border-left: 4px solid #3498db;
        }
        .sidebar .nav-link.active {
            background: #34495e;
            border-left: 4px solid #3498db;
        }
        .user-card {
            transition: transform 0.2s;
        }
        .user-card:hover {
            transform: translateY(-5px);
        }
        .role-admin {
            border-left: 4px solid #1e3a8a; /* Azul oscuro para admin */
        }
        .role-empleado {
            border-left: 4px solid #007bff; /* Azul normal para empleado */
        }
        .badge-admin {
            background-color: #1e3a8a !important; /* Azul oscuro para badge admin */
        }
        .badge-empleado {
            background-color: #007bff !important; /* Azul normal para badge empleado */
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar p-0">
                <div class="position-sticky pt-3">
                    <div class="text-center p-3 border-bottom">
                        <i class="fas fa-tools fa-2x text-white mb-2"></i>
                        <h5 class="text-white mb-0">Ferretería</h5>
                        <small class="text-muted" id="userRole"></small>
                    </div>
                    <ul class="nav flex-column mt-3" id="mainMenu">
                        <!-- Menú se carga dinámicamente -->
                    </ul>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4" style="background: #f8f9fa; min-height: 100vh;">
                <!-- Navbar -->
                <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
                    <div class="container-fluid">
                        <button class="btn btn-link d-md-none" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu">
                            <i class="fas fa-bars"></i>
                        </button>
                        
                        <div class="d-flex align-items-center">
                            <span class="navbar-text me-3" id="userInfo"></span>
                            <div class="dropdown">
                                <button class="btn btn-outline-secondary dropdown-toggle" type="button" id="userDropdown" data-bs-toggle="dropdown">
                                    <i class="fas fa-user me-2"></i>
                                </button>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Cerrar Sesión</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </nav>

                <!-- Content -->
                <div class="container-fluid mt-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2><i class="fas fa-user-cog me-2"></i>Gestión de Usuarios</h2>
                        <button class="btn btn-primary" onclick="showUserModal()" id="addUserBtn" style="display: none;">
                            <i class="fas fa-plus me-2"></i>Nuevo Usuario
                        </button>
                    </div>

                    <!-- Estadísticas -->
                    <div class="row mb-4">
                        <div class="col-md-3">
                            <div class="card bg-primary text-white">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between">
                                        <div>
                                            <h4 id="totalUsers">0</h4>
                                            <span>Total Usuarios</span>
                                        </div>
                                        <i class="fas fa-users fa-2x"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-white" style="background-color: #1e3a8a;"> <!-- Azul oscuro para admin -->
                                <div class="card-body">
                                    <div class="d-flex justify-content-between">
                                        <div>
                                            <h4 id="adminUsers">0</h4>
                                            <span>Administradores</span>
                                        </div>
                                        <i class="fas fa-user-shield fa-2x"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card bg-info text-white">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between">
                                        <div>
                                            <h4 id="employeeUsers">0</h4>
                                            <span>Empleados</span>
                                        </div>
                                        <i class="fas fa-user-tie fa-2x"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Lista de Usuarios -->
                    <div class="row" id="usersContainer">
                        <!-- Los usuarios se cargan dinámicamente -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal para Usuarios -->
    <div class="modal fade" id="userModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="userModalTitle">Nuevo Usuario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="userForm">
                        <input type="hidden" id="userId">
                        <div class="mb-3">
                            <label for="userName" class="form-label">Nombre Completo *</label>
                            <input type="text" class="form-control" id="userName" required>
                        </div>
                        <div class="mb-3">
                            <label for="userEmail" class="form-label">Email *</label>
                            <input type="email" class="form-control" id="userEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="userPassword" class="form-label" id="passwordLabel">Contraseña *</label>
                            <input type="password" class="form-control" id="userPassword">
                            <div class="form-text" id="passwordHelp">Dejar en blanco para mantener la contraseña actual</div>
                        </div>
                        <div class="mb-3">
                            <label for="userType" class="form-label">Tipo de Usuario *</label>
                            <select class="form-select" id="userType" required>
                                <option value="">Seleccionar tipo</option>
                                <option value="admin">Administrador</option>
                                <option value="empleado">Empleado</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="saveUser()">Guardar Usuario</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentUser = null;
        let users = [];

        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            loadUsers();
        });

        function checkAuth() {
            const user = localStorage.getItem('user');
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            currentUser = JSON.parse(user);
            document.getElementById('userInfo').textContent = `Bienvenido, ${currentUser.nombre}`;
            document.getElementById('userRole').textContent = currentUser.tipo;
            loadMenu();
            
            if (currentUser.tipo === 'admin') {
                document.getElementById('addUserBtn').style.display = 'block';
            }
        }

        function loadMenu() {
            const menu = document.getElementById('mainMenu');
            let menuItems = '';

            if (currentUser.tipo === 'admin') {
                menuItems = `
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="fas fa-tachometer-alt"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="products.html">
                            <i class="fas fa-box"></i>Productos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="categories.html">
                            <i class="fas fa-tags"></i>Categorías
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="suppliers.html">
                            <i class="fas fa-truck"></i>Proveedores
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="customers.html">
                            <i class="fas fa-users"></i>Clientes
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="sales.html">
                            <i class="fas fa-shopping-cart"></i>Ventas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="inventory.html">
                            <i class="fas fa-warehouse"></i>Inventario
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="users.html">
                            <i class="fas fa-user-cog"></i>Usuarios
                        </a>
                    </li>
                `;
            } else {
                window.location.href = 'dashboard.html'; // Empleados no pueden acceder
            }

            menu.innerHTML = menuItems;
        }

        async function loadUsers() {
            try {
                const response = await fetch('../api/index.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + currentUser.id_usuario
                    },
                    body: JSON.stringify({
                        action: 'getUsers'
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    users = result.data;
                    renderUsers();
                    updateUserStats();
                }
            } catch (error) {
                console.error('Error loading users:', error);
            }
        }

        function renderUsers() {
            const container = document.getElementById('usersContainer');
            container.innerHTML = '';

            users.forEach(user => {
                const roleClass = user.tipo === 'admin' ? 'role-admin' : 'role-empleado';
                const roleBadge = user.tipo === 'admin' ? 
                    '<span class="badge badge-admin">Administrador</span>' : 
                    '<span class="badge badge-empleado">Empleado</span>';

                // No permitir editar/eliminar el usuario actual
                const isCurrentUser = user.id_usuario === currentUser.id_usuario;
                const actions = isCurrentUser ? `
                    <div class="mt-3">
                        <span class="text-muted">Usuario actual</span>
                    </div>
                ` : `
                    <div class="mt-3">
                        <button class="btn btn-sm btn-warning me-1" onclick="editUser(${user.id_usuario})">
                            <i class="fas fa-edit me-1"></i>Editar
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id_usuario})">
                            <i class="fas fa-trash me-1"></i>Eliminar
                        </button>
                    </div>
                `;

                const card = `
                    <div class="col-md-6 col-lg-4 mb-4">
                        <div class="card user-card h-100 ${roleClass}">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <h5 class="card-title">${user.nombre}</h5>
                                    ${roleBadge}
                                </div>
                                
                                <div class="mb-3">
                                    <div class="d-flex align-items-center mb-2">
                                        <i class="fas fa-envelope me-2 text-muted"></i>
                                        <span>${user.email}</span>
                                    </div>
                                    <div class="d-flex align-items-center">
                                        <i class="fas fa-calendar me-2 text-muted"></i>
                                        <small class="text-muted">
                                            Registrado: ${new Date(user.fecha_creacion).toLocaleDateString()}
                                        </small>
                                    </div>
                                </div>
                                
                                ${actions}
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        function updateUserStats() {
            const totalUsers = users.length;
            const adminUsers = users.filter(u => u.tipo === 'admin').length;
            const employeeUsers = users.filter(u => u.tipo === 'empleado').length;

            document.getElementById('totalUsers').textContent = totalUsers;
            document.getElementById('adminUsers').textContent = adminUsers;
            document.getElementById('employeeUsers').textContent = employeeUsers;
        }

        function showUserModal() {
            document.getElementById('userModalTitle').textContent = 'Nuevo Usuario';
            document.getElementById('userForm').reset();
            document.getElementById('userId').value = '';
            document.getElementById('passwordLabel').textContent = 'Contraseña *';
            document.getElementById('userPassword').required = true;
            document.getElementById('passwordHelp').style.display = 'none';
            
            const modal = new bootstrap.Modal(document.getElementById('userModal'));
            modal.show();
        }

        async function editUser(id) {
            const user = users.find(u => u.id_usuario === id);
            if (user) {
                document.getElementById('userModalTitle').textContent = 'Editar Usuario';
                document.getElementById('userId').value = user.id_usuario;
                document.getElementById('userName').value = user.nombre;
                document.getElementById('userEmail').value = user.email;
                document.getElementById('userType').value = user.tipo;
                document.getElementById('passwordLabel').textContent = 'Contraseña';
                document.getElementById('userPassword').required = false;
                document.getElementById('passwordHelp').style.display = 'block';
                
                const modal = new bootstrap.Modal(document.getElementById('userModal'));
                modal.show();
            }
        }

        async function saveUser() {
            const form = document.getElementById('userForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const userData = {
                nombre: document.getElementById('userName').value,
                email: document.getElementById('userEmail').value,
                tipo: document.getElementById('userType').value
            };

            const password = document.getElementById('userPassword').value;
            if (password) {
                userData.password = password;
            }

            const userId = document.getElementById('userId').value;
            const action = userId ? 'updateUser' : 'createUser';

            if (userId) {
                userData.id = userId;
            }

            try {
                const response = await fetch('../api/index.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + currentUser.id_usuario
                    },
                    body: JSON.stringify({
                        action: action,
                        ...userData
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('Usuario guardado correctamente');
                    bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
                    loadUsers();
                } else {
                    alert('Error al guardar usuario: ' + result.message);
                }
            } catch (error) {
                console.error('Error saving user:', error);
                alert('Error de conexión al guardar usuario');
            }
        }

        async function deleteUser(id) {
            if (!confirm('¿Estás seguro de que quieres eliminar este usuario? Esta acción no se puede deshacer.')) {
                return;
            }

            try {
                const response = await fetch('../api/index.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + currentUser.id_usuario
                    },
                    body: JSON.stringify({
                        action: 'deleteUser',
                        id: id
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('Usuario eliminado correctamente');
                    loadUsers();
                } else {
                    alert('Error al eliminar usuario: ' + result.message);
                }
            } catch (error) {
                console.error('Error deleting user:', error);
                alert('Error de conexión al eliminar usuario');
            }
        }

        function logout() {
            if (confirm('¿Estás seguro de que quieres cerrar sesión?')) {
                localStorage.removeItem('user');
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
