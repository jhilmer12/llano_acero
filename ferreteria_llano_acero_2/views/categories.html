<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorías - Ferretería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: 100vh;
            background: #2c3e50;
        }
        .sidebar .nav-link {
            color: #ecf0f1;
            padding: 15px 20px;
            border-left: 4px solid transparent;
        }
        .sidebar .nav-link:hover {
            background: #34495e;
            border-left: 4px solid #3498db;
        }
        .sidebar .nav-link.active {
            background: #34495e;
            border-left: 4px solid #3498db;
        }
        .category-card {
            transition: transform 0.2s;
        }
        .category-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar p-0">
                <div class="position-sticky pt-3">
                    <div class="text-center p-3 border-bottom">
                        <i class="fas fa-tools fa-2x text-white mb-2"></i>
                        <h5 class="text-white mb-0">Ferretería</h5>
                        <small class="text-muted" id="userRole"></small>
                    </div>
                    <ul class="nav flex-column mt-3" id="mainMenu">
                        <!-- Menú se carga dinámicamente -->
                    </ul>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4" style="background: #f8f9fa; min-height: 100vh;">
                <!-- Navbar -->
                <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
                    <div class="container-fluid">
                        <button class="btn btn-link d-md-none" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu">
                            <i class="fas fa-bars"></i>
                        </button>
                        
                        <div class="d-flex align-items-center">
                            <span class="navbar-text me-3" id="userInfo"></span>
                            <div class="dropdown">
                                <button class="btn btn-outline-secondary dropdown-toggle" type="button" id="userDropdown" data-bs-toggle="dropdown">
                                    <i class="fas fa-user me-2"></i>
                                </button>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Cerrar Sesión</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </nav>

                <!-- Content -->
                <div class="container-fluid mt-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2><i class="fas fa-tags me-2"></i>Gestión de Categorías</h2>
                        <button class="btn btn-primary" onclick="showCategoryModal()" id="addCategoryBtn" style="display: none;">
                            <i class="fas fa-plus me-2"></i>Nueva Categoría
                        </button>
                    </div>

                    <!-- Estadísticas -->
                    <div class="row mb-4">
                        <div class="col-md-3">
                            <div class="card bg-primary text-white">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between">
                                        <div>
                                            <h4 id="totalCategories">0</h4>
                                            <span>Total Categorías</span>
                                        </div>
                                        <i class="fas fa-tags fa-2x"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Lista de Categorías -->
                    <div class="row" id="categoriesContainer">
                        <!-- Las categorías se cargan dinámicamente -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal para categorías -->
    <div class="modal fade" id="categoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="categoryModalTitle">Nueva Categoría</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="categoryForm">
                        <input type="hidden" id="categoryId">
                        <div class="mb-3">
                            <label for="categoryName" class="form-label">Nombre *</label>
                            <input type="text" class="form-control" id="categoryName" required>
                        </div>
                        <div class="mb-3">
                            <label for="categoryDescription" class="form-label">Descripción</label>
                            <textarea class="form-control" id="categoryDescription" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="saveCategory()">Guardar Categoría</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentUser = null;
        let categories = [];

        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            loadCategories();
        });

        // En la función checkAuth() agregar:
        function checkAuth() {
            const user = localStorage.getItem('user');
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            currentUser = JSON.parse(user);
            
            // Empleados no pueden acceder a categorías
            if (currentUser.tipo === 'empleado') {
                window.location.href = 'dashboard.html';
                return;
            }
            
            document.getElementById('userInfo').textContent = `Bienvenido, ${currentUser.nombre}`;
            document.getElementById('userRole').textContent = currentUser.tipo;
            
            // MOSTRAR BOTÓN PARA ADMINISTRADORES
            if (currentUser.tipo === 'admin') {
                document.getElementById('addCategoryBtn').style.display = 'block';
            }
            
            loadMenu();
        }

        function loadMenu() {
            const menu = document.getElementById('mainMenu');
            let menuItems = '';

            if (currentUser.tipo === 'admin') {
                menuItems = `
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="fas fa-tachometer-alt"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="products.html">
                            <i class="fas fa-box"></i>Productos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="categories.html">
                            <i class="fas fa-tags"></i>Categorías
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="suppliers.html">
                            <i class="fas fa-truck"></i>Proveedores
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="customers.html">
                            <i class="fas fa-users"></i>Clientes
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="sales.html">
                            <i class="fas fa-shopping-cart"></i>Ventas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="inventory.html">
                            <i class="fas fa-warehouse"></i>Inventario
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="users.html">
                            <i class="fas fa-user-cog"></i>Usuarios
                        </a>
                    </li>
                `;
            } else {
                menuItems = `
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="fas fa-tachometer-alt"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="products.html">
                            <i class="fas fa-box"></i>Productos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="categories.html">
                            <i class="fas fa-tags"></i>Categorías
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="customers.html">
                            <i class="fas fa-users"></i>Clientes
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="sales.html">
                            <i class="fas fa-shopping-cart"></i>Ventas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="inventory.html">
                            <i class="fas fa-warehouse"></i>Inventario
                        </a>
                    </li>
                `;
            }

            menu.innerHTML = menuItems;
        }

        async function loadCategories() {
            try {
                const response = await fetch('../api/index.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + currentUser.id_usuario
                    },
                    body: JSON.stringify({
                        action: 'getCategories'
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    categories = result.data;
                    renderCategories();
                    document.getElementById('totalCategories').textContent = categories.length;
                }
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        function renderCategories() {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = '';

            categories.forEach(category => {
                const actions = currentUser.tipo === 'admin' ? `
                    <div class="mt-3">
                        <button class="btn btn-sm btn-warning me-1" onclick="editCategory(${category.id_categoria})">
                            <i class="fas fa-edit me-1"></i>Editar
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteCategory(${category.id_categoria})">
                            <i class="fas fa-trash me-1"></i>Eliminar
                        </button>
                    </div>
                ` : '';

                const card = `
                    <div class="col-md-4 mb-4">
                        <div class="card category-card h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <h5 class="card-title">${category.nombre}</h5>
                                    <span class="badge bg-primary">${category.total_productos || 0} productos</span>
                                </div>
                                <p class="card-text text-muted">${category.descripcion || 'Sin descripción'}</p>
                                <small class="text-muted">
                                    Creada: ${new Date(category.fecha_creacion).toLocaleDateString()}
                                </small>
                                ${actions}
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        function showCategoryModal() {
            document.getElementById('categoryModalTitle').textContent = 'Nueva Categoría';
            document.getElementById('categoryForm').reset();
            document.getElementById('categoryId').value = '';
            const modal = new bootstrap.Modal(document.getElementById('categoryModal'));
            modal.show();
        }

        async function editCategory(id) {
            const category = categories.find(cat => cat.id_categoria === id);
            if (category) {
                document.getElementById('categoryModalTitle').textContent = 'Editar Categoría';
                document.getElementById('categoryId').value = category.id_categoria;
                document.getElementById('categoryName').value = category.nombre;
                document.getElementById('categoryDescription').value = category.descripcion || '';
                
                const modal = new bootstrap.Modal(document.getElementById('categoryModal'));
                modal.show();
            }
        }

        async function saveCategory() {
            const form = document.getElementById('categoryForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const categoryId = document.getElementById('categoryId').value;
            const categoryData = {
                nombre: document.getElementById('categoryName').value,
                descripcion: document.getElementById('categoryDescription').value
            };

            // Determinar acción y agregar ID si es edición
            const action = categoryId ? 'updateCategory' : 'createCategory';
            if (categoryId) {
                categoryData.id = categoryId;
            }

            console.log('📤 Enviando datos:', { action, ...categoryData });

            try {
                const response = await fetch('../api/index.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + currentUser.id_usuario
                    },
                    body: JSON.stringify({
                        action: action,
                        ...categoryData
                    })
                });
                
                const result = await response.json();
                console.log('📥 Respuesta recibida:', result);
                
                if (result.success) {
                    alert('✅ Categoría guardada correctamente');
                    bootstrap.Modal.getInstance(document.getElementById('categoryModal')).hide();
                    loadCategories();
                } else {
                    alert('❌ Error al guardar categoría: ' + (result.message || 'Error desconocido'));
                }
            } catch (error) {
                console.error('💥 Error saving category:', error);
                alert('❌ Error de conexión al guardar categoría: ' + error.message);
            }
        }

        async function deleteCategory(id) {
            if (!confirm('¿Estás seguro de que quieres eliminar esta categoría? Esta acción no se puede deshacer.')) {
                return;
            }

            try {
                console.log('🗑️ Intentando eliminar categoría ID:', id);
                
                const response = await fetch('../api/index.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: 'deleteCategory',
                        id: id
                    })
                });

                console.log('📡 Estado de respuesta:', response.status, response.statusText);

                if (!response.ok) {
                    throw new Error(`Error HTTP: ${response.status} - ${response.statusText}`);
                }

                const result = await response.json();
                console.log('📊 Resultado:', result);
                
                if (result.success) {
                    alert('✅ Categoría eliminada correctamente');
                    loadCategories();
                } else {
                    // Mostrar mensaje específico si hay productos asociados
                    if (result.message && result.message.includes('productos asociados')) {
                        alert('❌ ' + result.message + '\n\nPrimero debes eliminar o reasignar los productos de esta categoría.');
                    } else {
                        alert('❌ Error al eliminar categoría: ' + (result.message || 'Error desconocido'));
                    }
                }
            } catch (error) {
                console.error('💥 Error deleting category:', error);
                alert('❌ Error de conexión al eliminar categoría: ' + error.message);
            }
        }

        function logout() {
            if (confirm('¿Estás seguro de que quieres cerrar sesión?')) {
                localStorage.removeItem('user');
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
