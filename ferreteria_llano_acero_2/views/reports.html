<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes - Ferretería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar p-0" style="background: #2c3e50; min-height: 100vh;">
                <!-- Mismo sidebar que en dashboard -->
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="container-fluid mt-4">
                    <h2><i class="fas fa-chart-bar me-2"></i>Reportes del Sistema</h2>
                    
                    <!-- Reporte de Uso Facial -->
                    <div class="card mt-4">
                        <div class="card-header">
                            <h5 class="mb-0">Reporte de Reconocimiento Facial</h5>
                        </div>
                        <div class="card-body">
                            <button class="btn btn-primary mb-3" onclick="generateFaceReport()">
                                <i class="fas fa-sync-alt me-2"></i>Generar Reporte
                            </button>
                            <div id="faceReportResult"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        async function generateFaceReport() {
            try {
                const response = await fetch('http://localhost:5000/face_stats');
                const result = await response.json();
                
                if (result.success) {
                    const stats = result.stats;
                    const html = `
                        <div class="row">
                            <div class="col-md-4">
                                <div class="card bg-primary text-white">
                                    <div class="card-body">
                                        <h4>${stats.total_usuarios}</h4>
                                        <p>Total Usuarios</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="card bg-success text-white">
                                    <div class="card-body">
                                        <h4>${stats.usuarios_con_facial}</h4>
                                        <p>Con Registro Facial</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="card bg-info text-white">
                                    <div class="card-body">
                                        <h4>${parseFloat(stats.porcentaje_facial).toFixed(1)}%</h4>
                                        <p>Adopción Facial</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-4">
                            <h5>Últimos Accesos Faciales</h5>
                            <div class="table-responsive">
                                <table class="table table-striped">
                                    <thead>
                                        <tr>
                                            <th>Usuario</th>
                                            <th>Email</th>
                                            <th>Último Acceso</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${result.recent_access.map(access => `
                                            <tr>
                                                <td>${access.nombre}</td>
                                                <td>${access.email}</td>
                                                <td>${new Date(access.last_verification).toLocaleString()}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        
                        <div class="mt-3 text-muted">
                            <small>Reporte generado: ${result.report_date}</small>
                        </div>
                    `;
                    
                    document.getElementById('faceReportResult').innerHTML = html;
                } else {
                    document.getElementById('faceReportResult').innerHTML = `
                        <div class="alert alert-danger">${result.message}</div>
                    `;
                }
            } catch (error) {
                document.getElementById('faceReportResult').innerHTML = `
                    <div class="alert alert-danger">Error conectando con el servicio facial</div>
                `;
            }
        }
    </script>
</body>
</html>
